<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Asistente</title>
<style>
  :root {
    --bg: #0d0e12;
    --panel: #16171d;
    --panel-2: #1c1e25;
    --borde: #262832;
    --borde-fuerte: #33353f;
    --texto: #e8e9ed;
    --texto-sec: #9497a3;
    --texto-terciario: #666977;
    --acento: #7c7ff0;
    --acento-hover: #6b6ee0;
    --acento-tenue: rgba(124,127,240,0.12);
    --verde: #3bb883;
    --rojo: #e5625f;
    --sombra: 0 1px 3px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; max-width: 100%; overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--texto);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .layout { display: flex; min-height: 100vh; width: 100%; max-width: 100vw; overflow-x: hidden; }
  .sidebar {
    width: 232px; background: var(--panel); border-right: 1px solid var(--borde);
    padding: 24px 12px; flex-shrink: 0;
  }
  .logo { font-size: 15px; font-weight: 600; display:flex; align-items:center; gap:9px; padding: 0 8px; letter-spacing: -0.01em; }
  .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--acento); flex-shrink:0; }
  .logo-sub { font-size: 12px; color: var(--texto-terciario); margin: 2px 0 22px; padding: 0 8px; }
  .carpeta-nav {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px;
    margin-bottom: 2px; cursor: pointer; font-size: 13.5px; color: var(--texto-sec);
    border: 1px solid transparent; transition: background .1s;
  }
  .carpeta-nav:hover { background: var(--panel-2); color: var(--texto); }
  .carpeta-nav.activa { background: var(--acento-tenue); color: var(--texto); font-weight: 500; }
  .carpeta-nav .contador { margin-left: auto; font-size: 11px; color: var(--texto-terciario); font-variant-numeric: tabular-nums; }
  .carpeta-nav.boton-agregar { color: var(--texto-sec); }
  .carpeta-nav.boton-agregar:hover { color: var(--texto); }
  .btn-editar-carpeta { margin-left: auto; opacity: 0; font-size: 11px; padding: 2px 4px; transition: opacity .1s; }
  .carpeta-nav:hover .btn-editar-carpeta { opacity: 0.55; }
  .carpeta-nav .contador + .btn-editar-carpeta { margin-left: 6px; }
  .chip .btn-editar-carpeta { margin-left: 2px; opacity: 0.6; }
  .sidebar-sep { height: 1px; background: var(--borde); margin: 14px 8px; }
  .main { flex: 1; min-width: 0; padding: 32px 32px 100px; max-width: 880px; }
  h1 { font-size: 19px; font-weight: 600; margin: 0 0 3px; letter-spacing: -0.01em; }
  .subtitulo { color: var(--texto-terciario); font-size: 13px; margin-bottom: 24px; }
  .carpetas-scroll {
    display: none; gap: 6px; overflow-x: auto; padding: 2px 0 16px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .carpetas-scroll::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 8px; font-size: 13px; font-weight: 500;
    background: var(--panel); border: 1px solid var(--borde); color: var(--texto-sec); white-space: nowrap;
  }
  .chip.activa { background: var(--acento-tenue); border-color: var(--acento); color: var(--texto); }
  .chip .contador { font-size: 11px; color: var(--texto-terciario); }
  .chip.boton-agregar { color: var(--texto-sec); border-style: dashed; }
  .semana { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 24px; }
  .dia {
    background: var(--panel); border: 1px solid var(--borde); border-radius: 9px;
    padding: 10px 4px 8px; text-align: center; cursor: pointer; transition: border-color .1s;
  }
  .dia:hover { border-color: var(--borde-fuerte); }
  .dia.activo { border-color: var(--acento); background: var(--acento-tenue); }
  .dia.hoy { border-color: var(--borde-fuerte); }
  .dia.hoy .dia-num { color: var(--acento); }
  .dia-nombre { font-size: 10px; color: var(--texto-terciario); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .dia-num { font-size: 16px; font-weight: 600; margin: 3px 0; font-variant-numeric: tabular-nums; }
  .dia-puntos { display: flex; justify-content: center; gap: 3px; height: 5px; }
  .dia-punto { width: 4px; height: 4px; border-radius: 50%; background: var(--acento); }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--panel); border: 1px solid var(--borde); border-radius: 9px; padding: 3px; }
  .tab {
    flex: 1; text-align: center; padding: 7px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--texto-sec); transition: all .12s;
  }
  .tab.activo { background: var(--panel-2); color: var(--texto); box-shadow: var(--sombra); }
  .carpeta-grupo { margin-bottom: 22px; }
  .carpeta-titulo { font-size: 11.5px; font-weight: 600; margin-bottom: 8px; color: var(--texto-terciario); text-transform: uppercase; letter-spacing: .05em; }
  .item {
    display: flex; align-items: center; gap: 12px;
    background: var(--panel); border: 1px solid var(--borde); border-radius: 9px;
    padding: 12px 13px; margin-bottom: 6px; transition: border-color .12s;
  }
  .item:hover { border-color: var(--borde-fuerte); }
  .item.hecho { opacity: 0.4; }
  .item.hecho .item-texto { text-decoration: line-through; }
  .item-check {
    width: 19px; height: 19px; border-radius: 5px; border: 1.5px solid var(--borde-fuerte);
    cursor: pointer; flex-shrink: 0; display:flex; align-items:center; justify-content:center; transition: all .12s;
  }
  .item-check:hover { border-color: var(--acento); }
  .item-check.marcado { background: var(--verde); border-color: var(--verde); }
  .item-check.marcado::after { content: '✓'; font-size: 12px; color: #0d0e12; font-weight: 700; }
  .item-texto { flex: 1; min-width: 0; font-size: 14px; line-height: 1.4; overflow-wrap: break-word; word-break: break-word; }
  .btn-eliminar { border: none; background: none; color: var(--texto-terciario); font-size: 15px; cursor: pointer; padding: 6px 7px; border-radius: 6px; flex-shrink: 0; opacity: 0; transition: opacity .12s; }
  .item:hover .btn-eliminar { opacity: 1; }
  .btn-eliminar:hover { color: var(--rojo); background: var(--panel-2); }
  .vacio { color: var(--texto-terciario); text-align: center; padding: 64px 20px; font-size: 13.5px; }
  .config-grupo { background: var(--panel); border: 1px solid var(--borde); border-radius: 10px; padding: 16px; margin-bottom: 10px; }
  .config-grupo label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 9px; color: var(--texto-sec); }
  .config-grupo input[type=time], .config-grupo input[type=text] {
    font-size: 15px; padding: 9px 11px; border-radius: 7px; border: 1px solid var(--borde-fuerte);
    width: 100%; background: var(--panel-2); color: var(--texto);
  }
  .switch-fila { display: flex; align-items: center; justify-content: space-between; }
  .switch { position: relative; width: 40px; height: 23px; flex-shrink:0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track { position: absolute; inset: 0; background: var(--borde-fuerte); border-radius: 999px; transition: .15s; }
  .switch-track::after { content: ''; position: absolute; width: 17px; height: 17px; border-radius: 50%; background: var(--texto); top: 3px; left: 3px; transition: .15s; }
  .switch input:checked + .switch-track { background: var(--acento); }
  .switch input:checked + .switch-track::after { transform: translateX(17px); background: #fff; }
  .btn-guardar {
    background: var(--acento); color: #fff; border: none; padding: 12px; border-radius: 8px;
    font-size: 14px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 6px; transition: background .12s;
  }
  .btn-guardar:hover { background: var(--acento-hover); }
  #mensaje-guardado { text-align: center; color: var(--verde); font-size: 13px; margin-top: 10px; display: none; }
  .modal-fondo {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .modal-fondo.abierto { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--borde); border-radius: 12px;
    padding: 20px; width: 100%; max-width: 340px; box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .modal h3 { margin: 0 0 16px; font-size: 15px; font-weight: 600; }
  .modal-fila { display: flex; gap: 8px; margin-bottom: 14px; }
  .modal-fila input#nueva-carpeta-emoji { width: 52px; text-align: center; }
  .modal-fila input, .modal input[type=text] {
    font-size: 14.5px; padding: 9px 11px; border-radius: 7px; border: 1px solid var(--borde-fuerte);
    background: var(--panel-2); color: var(--texto);
  }
  .modal-fila input#nueva-carpeta-nombre { flex: 1; }
  .modal-botones { display: flex; gap: 8px; }
  .btn-secundario {
    flex: 1; padding: 10px; border-radius: 8px; background: transparent;
    border: 1px solid var(--borde-fuerte); color: var(--texto-sec); cursor: pointer; font-size: 13.5px; font-weight: 500;
    transition: all .12s;
  }
  .btn-secundario:hover { border-color: var(--texto-sec); color: var(--texto); }
  .btn-primario {
    flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 13.5px; font-weight: 600;
    background: var(--acento); color: #fff; transition: background .12s;
  }
  .btn-primario:hover { background: var(--acento-hover); }
  .fab {
    position: fixed; right: 22px; bottom: 88px; width: 50px; height: 50px; border-radius: 50%;
    background: var(--acento); border: none;
    color: #fff; font-size: 22px; font-weight: 600; cursor: pointer; z-index: 40;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center;
    transition: background .12s;
  }
  .fab:hover { background: var(--acento-hover); }
  @media (min-width: 721px) { .fab { bottom: 28px; } }
  .modal-fila-texto { display: flex; gap: 8px; align-items: center; }
  .modal-fila-texto textarea {
    flex: 1; font-size: 14.5px; padding: 9px 11px; border-radius: 7px; border: 1px solid var(--borde-fuerte);
    background: var(--panel-2); color: var(--texto); resize: none; min-height: 42px; font-family: inherit;
  }
  .btn-mic {
    width: 42px; height: 42px; border-radius: 8px; border: 1px solid var(--borde-fuerte); background: var(--panel-2);
    color: var(--texto-sec); font-size: 16px; cursor: pointer; flex-shrink: 0; transition: all .12s;
  }
  .btn-mic:hover { border-color: var(--acento); color: var(--texto); }
  .btn-mic.grabando { background: var(--rojo); color: white; border-color: var(--rojo); animation: pulso 1s infinite; }
  @keyframes pulso { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .modal select {
    font-size: 14.5px; padding: 9px 11px; border-radius: 7px; border: 1px solid var(--borde-fuerte);
    width: 100%; background: var(--panel-2); color: var(--texto); margin-bottom: 12px;
  }
  .modal-label { font-size: 12px; color: var(--texto-terciario); margin-bottom: 6px; display: block; font-weight: 500; }
  .bottom-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--panel); border-top: 1px solid var(--borde);
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
  }
  .nav-btn { flex: 1; text-align: center; padding: 6px 4px; border-radius: 9px; font-size: 10.5px; color: var(--texto-terciario); cursor: pointer; font-weight: 500; }
  .nav-btn .icono { font-size: 19px; display:block; margin-bottom: 2px; }
  .nav-btn.activo { color: var(--acento); }
  @media (max-width: 720px) {
    .sidebar { display: none; }
    .main { padding: 18px 16px 100px; }
    .carpetas-scroll { display: flex; }
    .bottom-nav { display: flex; }
    .semana { gap: 4px; }
    .dia { padding: 7px 2px; }
  }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="logo"><span class="logo-dot"></span>Mi Asistente</div>
    <div class="logo-sub">Panel personal</div>
    <div class="carpeta-nav activa" data-carpeta="" onclick="filtrarCarpeta('')">
      <span>📁</span><span>Todas</span><span class="contador" id="c-todas">0</span>
    </div>
    <div id="sidebar-carpetas"></div>
    <div class="carpeta-nav boton-agregar" onclick="abrirModalCarpeta()">
      <span>➕</span><span>Nueva carpeta</span>
    </div>
    <div class="sidebar-sep"></div>
    <div class="carpeta-nav" onclick="irAVista('config')">
      <span>⚙️</span><span>Configuración</span>
    </div>
  </div>

  <div class="main">
    <h1>📋 Panel de pendientes</h1>
    <div class="subtitulo">Todo lo que le mandas a tu asistente por WhatsApp</div>

    <div class="carpetas-scroll" id="carpetas-scroll"></div>

    <div id="vista-items">
      <div class="semana" id="semana"></div>
      <div class="tabs">
        <div class="tab activo" data-tab="pendientes" onclick="cambiarTab('pendientes')">Pendientes</div>
        <div class="tab" data-tab="hechos" onclick="cambiarTab('hechos')">Hechos</div>
      </div>
      <div id="lista-items"></div>
    </div>

    <div id="vista-config" style="display:none">
      <div class="config-grupo">
        <label>Recordatorio de la mañana</label>
        <input type="time" id="hora-manana">
      </div>
      <div class="config-grupo">
        <label>Recordatorio de la tarde</label>
        <input type="time" id="hora-tarde">
      </div>
      <div class="config-grupo">
        <div class="switch-fila">
          <label style="margin:0">Recordatorios automáticos</label>
          <label class="switch"><input type="checkbox" id="recordatorios-activos"><span class="switch-track"></span></label>
        </div>
      </div>
      <button class="btn-guardar" onclick="guardarConfig()">Guardar configuración</button>
      <div id="mensaje-guardado">✅ Guardado</div>
    </div>
  </div>
</div>

<button class="fab" onclick="abrirModalTarea()" aria-label="Nuevo pendiente">+</button>

<div class="bottom-nav">
  <div style="display:flex; width:100%">
    <div class="nav-btn activo" data-vista="items" onclick="irAVista('items')"><span class="icono">📋</span>Pendientes</div>
    <div class="nav-btn" data-vista="config" onclick="irAVista('config')"><span class="icono">⚙️</span>Ajustes</div>
  </div>
</div>

<div class="modal-fondo" id="modal-tarea">
  <div class="modal">
    <h3>Nuevo pendiente</h3>
    <label class="modal-label">Carpeta</label>
    <select id="tarea-carpeta"></select>
    <label class="modal-label">Día</label>
    <input type="date" id="tarea-fecha" style="margin-bottom:12px">
    <label class="modal-label">¿Qué necesitas hacer?</label>
    <div class="modal-fila-texto" style="margin-bottom:14px">
      <textarea id="tarea-texto" placeholder="Escribe o dicta por voz..."></textarea>
      <button type="button" class="btn-mic" id="btn-mic" onclick="alternarDictado()">🎤</button>
    </div>
    <div class="modal-botones">
      <button class="btn-secundario" onclick="cerrarModalTarea()">Cancelar</button>
      <button class="btn-primario" onclick="crearTareaNueva()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-fondo" id="modal-carpeta">
  <div class="modal">
    <h3 id="modal-carpeta-titulo">Nueva carpeta</h3>
    <div class="modal-fila">
      <input type="text" id="nueva-carpeta-emoji" placeholder="📁" maxlength="4">
      <input type="text" id="nueva-carpeta-nombre" placeholder="Nombre de la carpeta">
    </div>
    <div class="modal-botones">
      <button class="btn-secundario" onclick="cerrarModalCarpeta()">Cancelar</button>
      <button class="btn-primario" id="modal-carpeta-boton" onclick="guardarCarpeta()">Crear</button>
    </div>
    <button class="btn-secundario" id="modal-carpeta-eliminar" style="display:none; width:100%; margin-top:8px; color: var(--rojo); border-color: var(--rojo);" onclick="eliminarCarpetaActual()">Eliminar carpeta</button>
  </div>
</div>

<script>
const NOMBRES_DIA = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

let tabActual = 'pendientes';
let carpetaActual = '';
let diaActual = null;
let todosLosItems = [];
let todasLasCarpetas = [];

function irAVista(vista) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('activo', b.dataset.vista === vista));
  document.getElementById('vista-items').style.display = vista === 'items' ? 'block' : 'none';
  document.getElementById('carpetas-scroll').style.display = vista === 'items' ? '' : 'none';
  document.getElementById('vista-config').style.display = vista === 'config' ? 'block' : 'none';
}

function cambiarTab(tab) {
  tabActual = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('activo', t.dataset.tab === tab));
  renderizar();
}

function filtrarCarpeta(carpeta) {
  carpetaActual = carpeta;
  document.querySelectorAll('.carpeta-nav[data-carpeta]').forEach(el => el.classList.toggle('activa', el.dataset.carpeta === carpeta));
  renderizarChips();
  renderizar();
}

async function cargarCarpetas() {
  const res = await fetch('/api/carpetas');
  todasLasCarpetas = await res.json();
  renderizarSidebar();
  renderizarChips();
}

function renderizarSidebar() {
  let html = '';
  for (const c of todasLasCarpetas) {
    html += `
      <div class="carpeta-nav ${carpetaActual === c.clave ? 'activa' : ''}" data-carpeta="${c.clave}" onclick="filtrarCarpeta('${c.clave}')">
        <span>${c.emoji}</span><span>${escapeHtml(c.nombre)}</span><span class="contador" id="sc-${c.clave}">0</span>
        <span class="btn-editar-carpeta" onclick="event.stopPropagation(); abrirModalCarpeta('${c.clave}')">✏️</span>
      </div>`;
  }
  document.getElementById('sidebar-carpetas').innerHTML = html;
}

function renderizarChips() {
  let html = `<div class="chip ${carpetaActual === '' ? 'activa' : ''}" onclick="filtrarCarpeta('')">
    <span>📁 Todas</span><span class="contador" id="chip-todas">0</span></div>`;
  for (const c of todasLasCarpetas) {
    html += `
      <div class="chip ${carpetaActual === c.clave ? 'activa' : ''}" onclick="filtrarCarpeta('${c.clave}')">
        <span>${c.emoji} ${escapeHtml(c.nombre)}</span><span class="contador" id="chip-${c.clave}">0</span>
        <span class="btn-editar-carpeta" onclick="event.stopPropagation(); abrirModalCarpeta('${c.clave}')">✏️</span>
      </div>`;
  }
  html += `<div class="chip boton-agregar" onclick="abrirModalCarpeta()"><span>➕ Nueva</span></div>`;
  document.getElementById('carpetas-scroll').innerHTML = html;
}

function actualizarContadores() {
  const totalPend = todosLosItems.filter(i => !i.hecho).length;
  const elTodas = document.getElementById('c-todas'); if (elTodas) elTodas.textContent = totalPend;
  const elChipTodas = document.getElementById('chip-todas'); if (elChipTodas) elChipTodas.textContent = totalPend;
  for (const c of todasLasCarpetas) {
    const n = todosLosItems.filter(i => !i.hecho && i.carpeta === c.clave).length;
    const s = document.getElementById('sc-' + c.clave); if (s) s.textContent = n;
    const ch = document.getElementById('chip-' + c.clave); if (ch) ch.textContent = n;
  }
}

async function cargarItems() {
  const res = await fetch('/api/items');
  todosLosItems = await res.json();
  actualizarContadores();
  renderizarSemana();
  renderizar();
}

function renderizarSemana() {
  const hoy = new Date();
  const diaSemanaHoy = hoy.getDay();
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - ((diaSemanaHoy + 6) % 7));

  let html = '';
  for (let i = 0; i < 7; i++) {
    const dia = new Date(lunes);
    dia.setDate(lunes.getDate() + i);
    const claveDia = dia.toISOString().slice(0, 10);
    const esHoy = claveDia === hoy.toISOString().slice(0, 10);
    const cantidad = todosLosItems.filter(it => (it.creado_en || '').slice(0, 10) === claveDia).length;
    const activo = diaActual === claveDia;
    html += `
      <div class="dia ${esHoy ? 'hoy' : ''} ${activo ? 'activo' : ''}" onclick="filtrarDia('${claveDia}')">
        <div class="dia-nombre">${NOMBRES_DIA[dia.getDay()]}</div>
        <div class="dia-num">${dia.getDate()}</div>
        <div class="dia-puntos">${cantidad > 0 ? '<div class="dia-punto"></div>'.repeat(Math.min(cantidad, 3)) : ''}</div>
      </div>`;
  }
  document.getElementById('semana').innerHTML = html;
}

function filtrarDia(claveDia) {
  diaActual = diaActual === claveDia ? null : claveDia;
  renderizarSemana();
  renderizar();
}

function renderizar() {
  let items = todosLosItems.filter(i => tabActual === 'hechos' ? i.hecho : !i.hecho);
  if (carpetaActual) items = items.filter(i => i.carpeta === carpetaActual);
  if (diaActual) items = items.filter(i => (i.creado_en || '').slice(0, 10) === diaActual);
  const mensajeVacio = tabActual === 'hechos' ? 'Todavía no has completado nada' : 'No tienes pendientes 🎉';
  document.getElementById('lista-items').innerHTML = renderizarPorCarpeta(items, mensajeVacio);
}

function renderizarPorCarpeta(items, mensajeVacio) {
  if (items.length === 0) return `<div class="vacio">${mensajeVacio}</div>`;
  const porCarpeta = {};
  for (const item of items) {
    if (!porCarpeta[item.carpeta]) porCarpeta[item.carpeta] = [];
    porCarpeta[item.carpeta].push(item);
  }
  let html = '';
  for (const c of todasLasCarpetas) {
    if (!porCarpeta[c.clave]) continue;
    html += `<div class="carpeta-grupo"><div class="carpeta-titulo">${c.emoji} ${escapeHtml(c.nombre)}</div>`;
    for (const item of porCarpeta[c.clave]) {
      html += `
        <div class="item ${item.hecho ? 'hecho' : ''}">
          <div class="item-check ${item.hecho ? 'marcado' : ''}" onclick="alternarHecho(${item.id})"></div>
          <div class="item-texto">${escapeHtml(item.contenido)}</div>
          <button class="btn-eliminar" onclick="eliminarItem(${item.id})">✕</button>
        </div>`;
    }
    html += `</div>`;
  }
  return html;
}

function escapeHtml(texto) {
  const div = document.createElement('div');
  div.textContent = texto;
  return div.innerHTML;
}

async function alternarHecho(id) {
  await fetch(`/api/items/${id}/toggle`, { method: 'POST' });
  cargarItems();
}

async function eliminarItem(id) {
  if (!confirm('¿Eliminar este item?')) return;
  await fetch(`/api/items/${id}`, { method: 'DELETE' });
  cargarItems();
}

function abrirModalTarea() {
  const selectCarpeta = document.getElementById('tarea-carpeta');
  selectCarpeta.innerHTML = todasLasCarpetas.map(c => `<option value="${c.clave}">${c.emoji} ${escapeHtml(c.nombre)}</option>`).join('');
  if (carpetaActual) selectCarpeta.value = carpetaActual;

  const inputFecha = document.getElementById('tarea-fecha');
  inputFecha.value = diaActual || new Date().toISOString().slice(0, 10);

  document.getElementById('tarea-texto').value = '';
  document.getElementById('modal-tarea').classList.add('abierto');
}

function cerrarModalTarea() {
  document.getElementById('modal-tarea').classList.remove('abierto');
  detenerDictado();
}

async function crearTareaNueva() {
  const carpeta = document.getElementById('tarea-carpeta').value;
  const contenido = document.getElementById('tarea-texto').value.trim();
  const fecha = document.getElementById('tarea-fecha').value;
  if (!contenido) return;

  await fetch('/api/items', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ carpeta, contenido, fecha })
  });
  cerrarModalTarea();
  cargarItems();
}

let reconocimiento = null;
let dictando = false;

function alternarDictado() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Tu navegador no soporta dictado por voz. Prueba desde Chrome.');
    return;
  }
  if (dictando) {
    detenerDictado();
    return;
  }
  reconocimiento = new SpeechRecognition();
  reconocimiento.lang = 'es-ES';
  reconocimiento.interimResults = false;
  reconocimiento.maxAlternatives = 1;

  reconocimiento.onresult = (evento) => {
    const texto = evento.results[0][0].transcript;
    const campo = document.getElementById('tarea-texto');
    campo.value = (campo.value ? campo.value + ' ' : '') + texto;
  };
  reconocimiento.onend = () => detenerDictado();
  reconocimiento.onerror = () => detenerDictado();

  reconocimiento.start();
  dictando = true;
  document.getElementById('btn-mic').classList.add('grabando');
}

function detenerDictado() {
  if (reconocimiento) reconocimiento.stop();
  dictando = false;
  const btn = document.getElementById('btn-mic');
  if (btn) btn.classList.remove('grabando');
}

let carpetaEditando = null;

function abrirModalCarpeta(clave) {
  carpetaEditando = clave || null;
  const titulo = document.getElementById('modal-carpeta-titulo');
  const boton = document.getElementById('modal-carpeta-boton');
  const btnEliminar = document.getElementById('modal-carpeta-eliminar');

  if (carpetaEditando) {
    const c = todasLasCarpetas.find(c => c.clave === carpetaEditando);
    document.getElementById('nueva-carpeta-emoji').value = c ? c.emoji : '';
    document.getElementById('nueva-carpeta-nombre').value = c ? c.nombre : '';
    titulo.textContent = 'Editar carpeta';
    boton.textContent = 'Guardar cambios';
    btnEliminar.style.display = 'block';
  } else {
    document.getElementById('nueva-carpeta-emoji').value = '';
    document.getElementById('nueva-carpeta-nombre').value = '';
    titulo.textContent = 'Nueva carpeta';
    boton.textContent = 'Crear';
    btnEliminar.style.display = 'none';
  }
  document.getElementById('modal-carpeta').classList.add('abierto');
}
function cerrarModalCarpeta() {
  document.getElementById('modal-carpeta').classList.remove('abierto');
  carpetaEditando = null;
}
async function guardarCarpeta() {
  const nombre = document.getElementById('nueva-carpeta-nombre').value.trim();
  const emoji = document.getElementById('nueva-carpeta-emoji').value.trim() || '📁';
  if (!nombre) return;

  if (carpetaEditando) {
    await fetch(`/api/carpetas/${carpetaEditando}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, emoji })
    });
  } else {
    await fetch('/api/carpetas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, emoji })
    });
  }
  cerrarModalCarpeta();
  await cargarCarpetas();
  cargarItems();
}

async function eliminarCarpetaActual() {
  if (!carpetaEditando) return;
  if (!confirm('¿Eliminar esta carpeta? Los pendientes que tenga quedarán sin carpeta asignada.')) return;
  await fetch(`/api/carpetas/${carpetaEditando}`, { method: 'DELETE' });
  cerrarModalCarpeta();
  await cargarCarpetas();
  cargarItems();
}

async function cargarConfig() {
  const res = await fetch('/api/config');
  const config = await res.json();
  document.getElementById('hora-manana').value = config.hora_manana;
  document.getElementById('hora-tarde').value = config.hora_tarde;
  document.getElementById('recordatorios-activos').checked = config.recordatorios_activos === 'true';
}

async function guardarConfig() {
  const body = {
    hora_manana: document.getElementById('hora-manana').value,
    hora_tarde: document.getElementById('hora-tarde').value,
    recordatorios_activos: document.getElementById('recordatorios-activos').checked
  };
  await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const msg = document.getElementById('mensaje-guardado');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 2000);
}

(async () => {
  await cargarCarpetas();
  await cargarItems();
  cargarConfig();
})();
</script>
